<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Techwiz AI Assistant</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script>
    var host = window.location.hostname;
    // On localhost/127.0.0.1 (Windows dev): call backend directly
    // On remote server: use proxy (empty string = relative URL)
    if (host === 'localhost' || host === '127.0.0.1') {
      window.__API_URL__ = 'http://localhost:8000';
    } else {
      window.__API_URL__ = '';  // uses Angular proxy -> localhost:8000 on server
    }
    console.log('[API URL]', window.__API_URL__ || '(proxy)');
  </script>
</head>
<body class="mat-typography">
  <app-root></app-root>
</body>
</html>
